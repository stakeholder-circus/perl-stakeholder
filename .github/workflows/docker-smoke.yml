name: docker-smoke

on:
  workflow_call:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t perl-stakeholder .
      - name: List values
        run: docker run --rm perl-stakeholder --list-values
      - name: JSON smoke
        run: docker run --rm perl-stakeholder --output-format json --focus-family code_analyzer --seed 123
      - name: Experimental provider fail-fast
        run: |
          set +e
          docker run --rm perl-stakeholder --experimental-provider local-demo
          status=$?
          test "$status" -eq 2
