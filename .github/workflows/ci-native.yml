name: ci-native

on:
  workflow_call:
  workflow_dispatch:

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check syntax
        run: perl -c bin/stakeholder.pl
      - name: Run tests
        run: prove -Ilib t
      - name: Contract smoke
        run: perl -Ilib bin/stakeholder.pl --output-format json --focus-family code_analyzer --seed 123
